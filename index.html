<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown Games</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f8ff; margin: 0; padding: 0; }
    header { background: #0055ff; color: white; padding: 20px; text-align: center; font-size: 2rem; font-weight: bold; }
    .container { max-width: 600px; margin: 40px auto; background: white; border-radius: 15px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    label { display: block; margin-top: 15px; font-weight: bold; }
    input, select, textarea, button { width: 100%; margin-top: 5px; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 1rem; }
    button { background: #0055ff; color: white; border: none; cursor: pointer; transition: background 0.2s; }
    button:hover { background: #003cbf; }
    .note { font-size: 0.85rem; color: gray; margin-top: 5px; }
  </style>
</head>
<body>

<header>Countdown Games</header>

<div class="container">
  <form id="reportForm">
    <label for="reporter">Your Name</label>
    <input type="text" id="reporter" placeholder="Enter your name" required>

    <label for="game">Game Name</label>
    <select id="game" required>
      <option value="">Select Game</option>
      <option>Time Bomb</option>
      <option>Shock and Awe</option>
      <option>Pirate Ship</option>
      <option>The Scary One</option>
      <option>Bank Heist</option>
      <option>Pharaohs Curse</option>
      <option>Ghost Town</option>
      <option>Prison Break</option>
      <option>Murder Mansion</option>
      <option>Time Machine</option>
      <option>Supernova</option>
      <option>The Castle</option>
      <option>Abduction</option>
      <option>Jurassic Island</option>
    </select>

    <label for="severity">Severity</label>
    <select id="severity" required>
      <option value="">Select Severity</option>
      <option>Low</option>
      <option>Medium</option>
      <option>High</option>
    </select>

    <label for="description">Short Description</label>
    <textarea id="description" placeholder="Describe the issue" rows="4" required></textarea>

    <button type="submit">Submit Report</button>
  </form>
</div>

<script>
  const form = document.getElementById("reportForm");

  form.addEventListener("submit", async function(e) {
    e.preventDefault();

    const formData = {
      reporter: document.getElementById("reporter").value,
      game: document.getElementById("game").value,
      severity: document.getElementById("severity").value,
      description: document.getElementById("description").value
    };

    try {
      await fetch("https://script.google.com/macros/s/AKfycbxGTkQ2grnXMTeUsrqkMZdcIZuQUIpoXiFQG2hfXaTrF1B_xNHfzyZOvgKPQM1MCpJ_/exec", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(formData)
      });

      alert("Report submitted successfully! ✅");
      form.reset();
    } catch (err) {
      console.error(err);
      alert("Something went wrong. ⚠️");
    }
  });
</script>

</body>
</html>
